version: 2.2.1
name: cs450-tutor
description: CS450 teaching assistant chatbot for answering course questions
prompt:
- prompts/agents/cs450_tutor.md
llm: gpt-mini
checkpointer: sqlite
default: true
recursion_limit: 40
tools:
  patterns:
    - "mcp:chroma:chroma_query_documents"
    - "mcp:chroma:chroma_get_collection_info"
    - "mcp:chroma:chroma_get_collection_count"
    - "mcp:chroma:chroma_list_collections"
    - "mcp:chroma:chroma_peek_collection"
